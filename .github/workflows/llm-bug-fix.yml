name: LLM Bug Check and Fix

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write          # 必须有此权限，GITHUB_TOKEN 才能触发下一个 workflow

concurrency:
  group: llm-bug-fix
  cancel-in-progress: false

jobs:
  llm-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 305
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install opencode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify opencode
        run: opencode --version

      - name: Configure opencode (NVIDIA NIM provider)
        run: |
          cat > opencode.json <<'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "nvidia": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "NVIDIA NIM",
                "options": {
                  "baseURL": "https://integrate.api.nvidia.com/v1",
                  "apiKey": "{env:NVIDIA_API_KEY}"
                },
                "models": {
                  "z-ai/glm-5.2": {
                    "name": "GLM 5.2"
                  }
                }
              }
            },
            "model": "nvidia/z-ai/glm-5.2"
          }
          EOF
          # 防止 opencode 会话文件被提交
          grep -qxF '.opencode/' .gitignore 2>/dev/null || printf '\n.opencode/\n' >> .gitignore

      - name: Run opencode Bug-Fix Loop
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          MAX_DURATION_SECONDS: "18000"
          OPENCODE_MODEL: "nvidia/z-ai/glm-5.2"
        run: |
          python - <<'PYEOF'
          import os, sys, time, subprocess, traceback

          MAX_DUR = int(os.environ["MAX_DURATION_SECONDS"])
          MODEL   = os.environ["OPENCODE_MODEL"]
          START   = time.time()

          # ------------------------------------------------------------------ #
          #  工具函数
          # ------------------------------------------------------------------ #
          def run_cmd(cmd, timeout=120, **kw):
              try:
                  return subprocess.run(cmd, capture_output=True, text=True,
                                        timeout=timeout, **kw)
              except subprocess.TimeoutExpired:
                  return subprocess.CompletedProcess(cmd, 124, "", "timeout")

          def git_setup():
              run_cmd(["git", "config", "user.name",  "github-actions[bot]"])
              run_cmd(["git", "config", "user.email", "github-actions@github.com"])

          def read_file(p):
              try:
                  with open(p, 'r', encoding='utf-8', errors='replace') as f:
                      return f.read()
              except Exception:
                  return None

          def find_py_files():
              out = []
              for root, dirs, fnames in os.walk('.'):
                  parts = root.split(os.sep)
                  if '.git' in parts:
                      continue
                  dirs[:] = [d for d in dirs if d not in (
                      '.git', '__pycache__', '.venv', 'venv', 'env',
                      'node_modules', '.idea', '.vscode', '.opencode')]
                  for f in fnames:
                      if f.endswith('.py'):
                          out.append(os.path.normpath(os.path.join(root, f)))
              return sorted(set(out))

          def git_porcelain():
              r = run_cmd(["git", "status", "--porcelain"])
              files = set()
              for line in r.stdout.splitlines():
                  if not line.strip():
                      continue
                  if line[:2] in ("R ", "C ", "RM", "CM") or line[0] in ("R", "C"):
                      path = line[3:].split(" -> ")[-1].strip().strip('"')
                  else:
                      path = line[3:].strip().strip('"')
                  if path:
                      files.add(os.path.normpath(path))
              return files

          def git_commit_one_file(file_path, msg):
              run_cmd(["git", "add", "--", file_path])
              r = run_cmd(["git", "commit", "-m", msg, "--", file_path])
              if r.returncode != 0:
                  print("  跳过提交 (无内容可提交?):",
                        r.stdout.strip(), r.stderr.strip())
                  return False
              for _ in range(3):
                  pr = run_cmd(["git", "push"], timeout=60)
                  if pr.returncode == 0:
                      return True
                  run_cmd(["git", "pull", "--rebase", "origin",
                           os.environ.get("GITHUB_REF_NAME", "HEAD")], timeout=60)
                  time.sleep(3)
              print("  git push 失败:", pr.stdout, pr.stderr)
              return False

          def git_commit_push_all(msg):
              # 提交前清理 opencode 产物
              if os.path.exists("opencode.json"):
                  os.remove("opencode.json")
              if os.path.isdir(".opencode"):
                  run_cmd(["rm", "-rf", ".opencode"])
              run_cmd(["git", "add", "-A"])
              r = run_cmd(["git", "commit", "-m", msg])
              if r.returncode != 0:
                  return False
              for _ in range(3):
                  pr = run_cmd(["git", "push"], timeout=60)
                  if pr.returncode == 0:
                      return True
                  run_cmd(["git", "pull", "--rebase", "origin",
                           os.environ.get("GITHUB_REF_NAME", "HEAD")], timeout=60)
                  time.sleep(3)
              return False

          def cleanup_unwanted(before_files, target_norm):
              """还原 / 删除 opencode 对非目标文件的一切改动。"""
              after = git_porcelain()
              changed = after - before_files
              for f in changed:
                  fnorm = os.path.normpath(f)
                  if fnorm == target_norm:
                      continue
                  run_cmd(["git", "checkout", "--", f])
                  if os.path.exists(f):
                      run_cmd(["rm", "-rf", f])

          # ------------------------------------------------------------------ #
          #  Prompt
          # ------------------------------------------------------------------ #
          REVIEW_PROMPT = (
              "你是一位严谨的科研/学术类 Python 代码审查员。"
              "你将收到项目的 README.md（背景信息）和一个待审查的 .py 文件路径及其内容。"
              "你的目标是确保代码可以在 kaggle 上运行，并找出可能影响实验结果的 Bug，包括但不限于："
              "错误的数学/公式、错误的变量名、差一错误、"
              "错误的 axis/keepdims/dim 参数、不正确的降维或聚合操作、"
              "误用随机种子/不确定性、训练与评估之间的数据泄露、不正确的指标计算、"
              "错误的张量形状、隐式广播引发的 Bug、参数顺序颠倒、错误的数据类型、"
              "缺失 detach()/no_grad、不正确的 loss 降维方式、符号错误、整数与浮点数除法混淆、"
              "影响数值计算的错误设备放置等。\n"
              "不要报告代码风格、格式、注释、命名规范或任何不影响数值/实验结果的问题。"
              "不要修改 README.md。\n\n"
              "关键约束：\n"
              "1. 每次只能修改当前审查的单个文件。\n"
              "2. 绝不能触碰、引用或影响代码库中的任何其他文件。\n"
              "3. 如果没有发现此类 Bug，不要做任何修改。\n"
              "4. 如果发现了 Bug，请直接使用你的文件编辑工具修改该文件，只改动修复 Bug 所需的部分。\n"
              "5. 保持整体文件结构不变，保留原有的缩进和编码格式 (UTF-8)。\n"
              "6. 除非修复严格要求，否则不要添加或删除顶层导入。\n"
              "7. 不要创建新文件，不要删除文件，不要运行任何 shell 命令或脚本。\n"
          )

          def call_opencode(readme, file_path, file_content):
              user_msg = (
                  f"{REVIEW_PROMPT}\n\n"
                  f"=== README.md (项目背景信息) ===\n{readme}\n\n"
                  f"=== 待审查文件路径 ===\n{file_path}\n\n"
                  f"=== 文件内容 ===\n```python\n{file_content}\n```\n\n"
                  f"请审查文件 `{file_path}` 中影响实验结果的 Bug。"
                  f"如果没有 Bug，不要做任何修改。"
                  f"如果有 Bug，请直接编辑文件 `{file_path}` 来修复。"
              )
              return subprocess.run(
                  ["opencode", "run", "--model", MODEL, user_msg],
                  capture_output=True, text=True,
                  env=os.environ.copy(),
                  timeout=900,        # 单次调用最多 15 分钟
              )

          # ------------------------------------------------------------------ #
          #  主循环
          # ------------------------------------------------------------------ #
          git_setup()

          iteration = 0
          stop_reason = None
          while True:
              elapsed = time.time() - START
              if elapsed >= MAX_DUR:
                  stop_reason = f"已达到时间限制 ({elapsed:.0f}s)"
                  break

              iteration += 1
              print(f"\n=========== 第 {iteration} 次迭代 (已耗时 {elapsed:.0f}s) ===========")
              py_files = find_py_files()
              if not py_files:
                  print("未找到 .py 文件。停止运行。")
                  stop_reason = "no .py files"
                  break

              readme = read_file("README.md") or ""
              if not os.path.exists("README.md"):
                  print("警告: 未找到 README.md；使用空上下文。")

              any_changes_this_iter = False
              no_diff_count = 0
              failed_count = 0

              for fp in py_files:
                  if time.time() - START >= MAX_DUR:
                      stop_reason = "迭代中途达到时间限制"
                      break

                  content = read_file(fp)
                  if content is None:
                      continue

                  print(f"\n--- 正在检查 {fp} ---")

                  before_files = git_porcelain()
                  target_norm  = os.path.normpath(fp)

                  # ---- 调用 opencode ----
                  r = None
                  while True:
                      if time.time() - START >= MAX_DUR:
                          stop_reason = "opencode 调用期间达到时间限制"
                          break
                      try:
                          r = call_opencode(readme, fp, content)
                          break
                      except subprocess.TimeoutExpired:
                          print(f"  {fp} opencode 调用超时（15 分钟），跳过")
                          failed_count += 1
                          r = None
                          break
                      except Exception as e:
                          print(f"  {fp} opencode 错误: {e}")
                          traceback.print_exc()
                          time.sleep(30)

                  if stop_reason:
                      break
                  if r is None:
                      continue

                  if r.returncode != 0:
                      print(f"  -> opencode 退出码 {r.returncode}")
                      if r.stderr:
                          print("     stderr:", r.stderr[:500])
                      cleanup_unwanted(before_files, target_norm)
                      run_cmd(["git", "checkout", "--", fp])
                      failed_count += 1
                      continue

                  if r.stdout:
                      lines   = r.stdout.splitlines()
                      preview = "\n     ".join(lines[-20:])
                      print(f"  -> opencode 输出 (最后 20 行):\n     {preview}")

                  # ---- 清理非目标文件改动 ----
                  cleanup_unwanted(before_files, target_norm)

                  # ---- 检查目标文件是否被修改 ----
                  after_files = git_porcelain()
                  if target_norm not in after_files:
                      print("  -> 无需更改")
                      no_diff_count += 1
                      continue

                  new_content = read_file(fp)
                  if new_content is None or new_content == content:
                      print("  -> 文件内容未更改；跳过。")
                      run_cmd(["git", "checkout", "--", fp])
                      no_diff_count += 1
                      continue

                  # ---- 语法检查 ----
                  synth = run_cmd(["python3", "-m", "py_compile", fp], timeout=30)
                  if synth.returncode != 0:
                      print(f"  -> 修改后文件有语法错误，正在还原:")
                      print("    ", synth.stderr[:500])
                      run_cmd(["git", "checkout", "--", fp])
                      failed_count += 1
                      continue

                  print(f"  -> 已将修复应用到 {fp}")

                  if git_commit_one_file(
                      fp,
                      f"opencode: 修复影响实验结果的 bug {fp} "
                      f"(第 {iteration} 次迭代)"
                  ):
                      any_changes_this_iter = True
                  else:
                      print("  -> 提交/推送此文件失败；将继续处理。")
                      failed_count += 1

              if stop_reason:
                  break

              if no_diff_count == len(py_files):
                  print("\n本次迭代无更改 — 所有文件均已检查完毕。停止运行。")
                  stop_reason = "all files clean"
                  break

              if failed_count > 0 and not any_changes_this_iter:
                  print(f"\n本次迭代中有 {failed_count} 个文件处理失败。将在下一次迭代中重试...")

          print(f"\n停止原因: {stop_reason}")
          git_commit_push_all(f"opencode: 最终提交 ({stop_reason})")
          print("完成。")
          PYEOF

  # ==========================================
  # 自触发 Job：确保上一次执行完后自动触发下一次
  # ==========================================
  trigger-next:
    needs: llm-fix
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    timeout-minutes: 5
    steps:
      - name: Trigger next workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_REF: ${{ github.ref }}
          REPO: ${{ github.repository }}
        run: |
          echo "上一个任务的状态: ${{ needs.llm-fix.result }}"
          echo "等待 10 秒进行清理..."
          sleep 10

          # 1. 获取当前 Workflow 的 ID
          WF_ID=$(gh api "/repos/$REPO/actions/workflows" --jq ".workflows[] | select(.name == \"$WORKFLOW_NAME\") | .id")

          if [ -z "$WF_ID" ]; then
            echo "❌ 找不到 '$WORKFLOW_NAME' 的工作流 ID。循环将在此停止。"
            exit 1
          fi

          echo "找到工作流 ID: $WF_ID"

          # 2. 触发下一次运行
          if gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/workflows/$WF_ID/dispatches" \
            -f "ref=$WORKFLOW_REF"; then
            echo "✅ 成功触发 '$WORKFLOW_NAME' 在分支 '$WORKFLOW_REF' 上的下一次运行"
          else
            echo "❌ 触发下一次运行失败。"
            exit 1
          fi

          # 3. 验证是否触发成功
          sleep 5
          echo "最近的工作流运行记录:"
          gh run list --workflow "$WORKFLOW_NAME" --limit 3