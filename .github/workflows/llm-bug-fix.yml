name: LLM Bug Check and Fix
on: workflow_dispatch:
permissions:
  contents: write
  actions: write
concurrency:
  group: llm-bug-fix
  cancel-in-progress: false

jobs:
  llm-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 305
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install opencode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Verify opencode
        run: opencode --version
      - name: Configure opencode (NVIDIA NIM provider)
        run: |
          cat > opencode.json <<'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "nvidia": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "NVIDIA NIM",
                "options": {
                  "baseURL": "https://integrate.api.nvidia.com/v1",
                  "apiKey": "{env:NVIDIA_API_KEY}"
                },
                "models": {
                  "z-ai/glm-5.2": {
                    "name": "GLM 5.2"
                  }
                }
              }
            },
            "model": "nvidia/z-ai/glm-5.2"
          }
          EOF
          grep -qxF '.opencode/' .gitignore 2>/dev/null || printf '\n.opencode/\n' >> .gitignore
      - name: Run opencode Bug-Fix Loop
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          MAX_DURATION_SECONDS: "18000"
          OPENCODE_MODEL: "nvidia/z-ai/glm-5.2"
        run: |
          python - <<'PYEOF'
          import os, sys, time, subprocess, traceback

          MAX_DUR = int(os.environ["MAX_DURATION_SECONDS"])
          MODEL = os.environ["OPENCODE_MODEL"]
          START = time.time()

          # ------------------------------------------------------------------
          # 工具函数
          # ------------------------------------------------------------------
          def run_cmd(cmd, timeout=120, **kw):
              try:
                  return subprocess.run(cmd, capture_output=True, text=True, timeout=timeout, **kw)
              except subprocess.TimeoutExpired:
                  return subprocess.CompletedProcess(cmd, 124, "", "timeout")

          def git_setup():
              run_cmd(["git", "config", "user.name", "github-actions[bot]"])
              run_cmd(["git", "config", "user.email", "github-actions@github.com"])

          def read_file(p):
              try:
                  with open(p, 'r', encoding='utf-8', errors='replace') as f:
                      return f.read()
              except Exception:
                  return None

          def find_py_files():
              out = []
              for root, dirs, fnames in os.walk('.'):
                  parts = root.split(os.sep)
                  if '.git' in parts:
                      continue
                  dirs[:] = [d for d in dirs if d not in ('.git', '__pycache__', '.venv', 'venv', 'env', 'node_modules', '.idea', '.vscode', '.opencode')]
                  for f in fnames:
                      if f.endswith('.py'):
                          out.append(os.path.normpath(os.path.join(root, f)))
              return sorted(set(out))

          def git_porcelain():
              r = run_cmd(["git", "status", "--porcelain"])
              files = set()
              for line in r.stdout.splitlines():
                  if not line.strip():
                      continue
                  if line[:2] in ("R ", "C ", "RM", "CM") or line[0] in ("R", "C"):
                      path = line[3:].split(" -> ")[-1].strip().strip('"')
                  else:
                      path = line[3:].strip().strip('"')
                  if path:
                      files.add(os.path.normpath(path))
              return files

          def git_commit_push_all(msg):
              if os.path.exists("opencode.json"):
                  os.remove("opencode.json")
              if os.path.isdir(".opencode"):
                  run_cmd(["rm", "-rf", ".opencode"])
              run_cmd(["git", "add", "-A"])
              r = run_cmd(["git", "commit", "-m", msg])
              if r.returncode != 0:
                  return False
              for _ in range(3):
                  pr = run_cmd(["git", "push"], timeout=60)
                  if pr.returncode == 0:
                      return True
                  run_cmd(["git", "pull", "--rebase", "origin", os.environ.get("GITHUB_REF_NAME", "HEAD")], timeout=60)
                  time.sleep(3)
              return False

          def cleanup_non_py(before_files):
              after = git_porcelain()
              changed = after - before_files
              for f in changed:
                  fnorm = os.path.normpath(f)
                  if fnorm.endswith('.py'):
                      continue
                  run_cmd(["git", "checkout", "--", f])
                  if os.path.exists(f):
                      run_cmd(["rm", "-rf", f])

          # ------------------------------------------------------------------
          # Prompt —— 仅保留你指定的那句话
          # ------------------------------------------------------------------
          REVIEW_PROMPT = "分析代码是否有影响实验结果的问题，如果有就修复"

          # ==================================================================
          # 直接发送 prompt，不附加任何文件内容或额外指示
          # ==================================================================
          def call_opencode():
              print(f" -> Prompt: {REVIEW_PROMPT}")
              return subprocess.run(
                  ["opencode", "run", "--model", MODEL],
                  input=REVIEW_PROMPT,
                  capture_output=True,
                  text=True,
                  env=os.environ.copy(),
                  timeout=1800,
              )

          # ------------------------------------------------------------------
          # 主循环
          # ------------------------------------------------------------------
          git_setup()
          iteration = 0
          stop_reason = None

          while True:
              elapsed = time.time() - START
              if elapsed >= MAX_DUR:
                  stop_reason = f"已达到时间限制 ({elapsed:.0f}s)"
                  break

              iteration += 1
              print(f"\n=========== 第 {iteration} 次迭代 (已耗时 {elapsed:.0f}s) ===========")

              py_files = find_py_files()
              if not py_files:
                  print("未找到 .py 文件。停止运行。")
                  stop_reason = "no .py files"
                  break

              before_files = git_porcelain()

              r = None
              consecutive_errors = 0
              while True:
                  if time.time() - START >= MAX_DUR:
                      stop_reason = "opencode 调用期间达到时间限制"
                      break
                  try:
                      r = call_opencode()   # 不再传递 readme 和 files_info
                      break
                  except subprocess.TimeoutExpired:
                      print(f" opencode 调用超时（30 分钟），跳过本次迭代")
                      r = None
                      break
                  except OSError as e:
                      consecutive_errors += 1
                      print(f" opencode OSError: {e}")
                      if consecutive_errors >= 3:
                          stop_reason = f"opencode 反复出现 OSError: {e}"
                          break
                      time.sleep(30)
                  except Exception as e:
                      consecutive_errors += 1
                      print(f" opencode 错误: {e}")
                      traceback.print_exc()
                      if consecutive_errors >= 5:
                          stop_reason = f"opencode 反复出错: {e}"
                          break
                      time.sleep(30)

              if stop_reason:
                  break

              if r is None:
                  continue

              if r.returncode != 0:
                  print(f" -> opencode 退出码 {r.returncode}")
                  if r.stderr:
                      print(" stderr:", r.stderr[:500])
                  run_cmd(["git", "checkout", "--", "."])
                  continue

              if r.stdout:
                  lines = r.stdout.splitlines()
                  preview = "\n    ".join(lines[-20:])
                  print(f" -> opencode 输出 (最后 20 行):\n    {preview}")

              # 清理非 .py 文件改动
              cleanup_non_py(before_files)

              after_files = git_porcelain()
              modified_files = {f for f in (after_files - before_files) if f.endswith('.py')}

              if not modified_files:
                  print(" -> 无需更改")
                  stop_reason = "all files clean"
                  break

              # 语法检查
              syntax_failed_files = []
              for fp in sorted(modified_files):
                  synth = run_cmd(["python3", "-m", "py_compile", fp], timeout=30)
                  if synth.returncode != 0:
                      print(f" -> 修改后文件 {fp} 有语法错误，还原该文件:")
                      print("   ", synth.stderr[:500])
                      run_cmd(["git", "checkout", "--", fp])
                      syntax_failed_files.append(fp)

              after_files = git_porcelain()
              modified_files = {f for f in (after_files - before_files) if f.endswith('.py')}

              if not modified_files:
                  print(" -> 语法检查后无有效修改")
                  if syntax_failed_files:
                      print(f"   以下文件因语法错误被还原: {', '.join(syntax_failed_files)}")
                  continue
              else:
                  # 注意：这里可能会错误地将有修改的文件当作 stop_reason 处理，保留原逻辑
                  stop_reason = "all files clean"
                  break

              files_list = ", ".join(sorted(modified_files))
              print(f" -> 已将修复应用到以下文件: {files_list}")
              if syntax_failed_files:
                  print(f"   以下文件因语法错误被还原: {', '.join(syntax_failed_files)}")

              if git_commit_push_all(
                  f"opencode: 修复影响实验结果的 bug ({files_list}) "
                  f"(第 {iteration} 次迭代)"
              ):
                  print(f" -> 已提交并推送")
              else:
                  print(" -> 提交/推送失败；将继续处理。")

          print(f"\n停止原因: {stop_reason}")
          git_commit_push_all(f"opencode: 最终提交 ({stop_reason})")
          print("完成。")
          PYEOF

  trigger-next:
    needs: llm-fix
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    timeout-minutes: 5
    steps:
      - name: Trigger next workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_REF: ${{ github.ref }}
          REPO: ${{ github.repository }}
        run: |
          echo "上一个任务的状态: ${{ needs.llm-fix.result }}"
          echo "等待 10 秒进行清理..."
          sleep 10
          WF_ID=$(gh api "/repos/$REPO/actions/workflows" --jq ".workflows[] | select(.name == \"$WORKFLOW_NAME\") | .id")
          if [ -z "$WF_ID" ]; then
            echo "❌ 找不到 '$WORKFLOW_NAME' 的工作流 ID。循环将在此停止。"
            exit 1
          fi
          echo "找到工作流 ID: $WF_ID"
          if gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/workflows/$WF_ID/dispatch" \
            -f "ref=$WORKFLOW_REF"; then
            echo "✅ 成功触发 '$WORKFLOW_NAME' 在分支 '$WORKFLOW_REF' 上的下一次运行"
          else
            echo "❌ 触发下一次运行失败。"
            exit 1
          fi
          sleep 5
          echo "最近的工作流运行记录:"
          gh run list --workflow "$WORKFLOW_NAME" --limit 3