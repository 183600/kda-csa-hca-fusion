name: LLM Bug Check and Fix

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: llm-bug-fix
  cancel-in-progress: false

jobs:
  llm-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 305
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install opencode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify opencode
        run: opencode --version

      - name: Configure opencode (NVIDIA NIM provider)
        run: |
          cat > opencode.json <<'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "nvidia": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "NVIDIA NIM",
                "options": {
                  "baseURL": "https://integrate.api.nvidia.com/v1",
                  "apiKey": "{env:NVIDIA_API_KEY}"
                },
                "models": {
                  "z-ai/glm-5.2": {
                    "name": "GLM 5.2"
                  }
                }
              }
            },
            "model": "nvidia/z-ai/glm-5.2"
          }
          EOF
          grep -qxF '.opencode/' .gitignore 2>/dev/null || printf '\n.opencode/\n' >> .gitignore

      - name: Run opencode Bug-Fix Loop
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          MAX_DURATION_SECONDS: "18000"
          OPENCODE_MODEL: "nvidia/z-ai/glm-5.2"
        run: |
          python - <<'PYEOF'
          import os, time, subprocess

          MAX_DUR = int(os.environ["MAX_DURATION_SECONDS"])
          MODEL   = os.environ["OPENCODE_MODEL"]
          START   = time.time()

          REVIEW_PROMPT = "分析代码是否有影响实验结果的问题，如果有就修复，dyn_csa_experiment.ipynb是另一个实验的代码，dyn_csa_experiment.ipynb的问题也要修复"

          def run_cmd(cmd, timeout=120, **kw):
              try:
                  return subprocess.run(cmd, capture_output=True, text=True,
                                        timeout=timeout, **kw)
              except subprocess.TimeoutExpired:
                  return subprocess.CompletedProcess(cmd, 124, "", "timeout")

          def git_setup():
              run_cmd(["git", "config", "user.name",  "github-actions[bot]"])
              run_cmd(["git", "config", "user.email", "github-actions@github.com"])

          def git_commit_push_all(msg):
              if os.path.exists("opencode.json"):
                  os.remove("opencode.json")
              if os.path.isdir(".opencode"):
                  run_cmd(["rm", "-rf", ".opencode"])
              run_cmd(["git", "add", "-A"])
              r = run_cmd(["git", "commit", "-m", msg])
              if r.returncode != 0:
                  return False
              for _ in range(3):
                  pr = run_cmd(["git", "push"], timeout=60)
                  if pr.returncode == 0:
                      return True
                  run_cmd(["git", "pull", "--rebase", "origin",
                           os.environ.get("GITHUB_REF_NAME", "HEAD")], timeout=60)
                  time.sleep(3)
              return False

          def call_opencode():
              user_msg = REVIEW_PROMPT
              print(f"  -> Prompt 大小: {len(user_msg.encode('utf-8')):,} 字节")
              return subprocess.run(
                  ["opencode", "run", "--model", MODEL],
                  input=user_msg,
                  capture_output=True, text=True,
                  env=os.environ.copy(),
                  timeout=1800,
              )

          git_setup()

          iteration = 0
          while True:
              elapsed = time.time() - START
              if elapsed >= MAX_DUR:
                  print(f"\n已达到时间限制 ({elapsed:.0f}s)，停止。")
                  break

              iteration += 1
              print(f"\n=========== 第 {iteration} 次迭代 (已耗时 {elapsed:.0f}s) ===========")

              try:
                  r = call_opencode()
              except subprocess.TimeoutExpired:
                  print("  opencode 调用超时（30 分钟），跳过本次迭代")
                  continue
              except Exception as e:
                  print(f"  opencode 错误: {e}")
                  time.sleep(30)
                  continue

              if r.returncode != 0:
                  print(f"  -> opencode 退出码 {r.returncode}")
                  if r.stderr:
                      print("     stderr:", r.stderr[:500])
                  run_cmd(["git", "checkout", "--", "."])
                  continue

              if r.stdout:
                  lines   = r.stdout.splitlines()
                  preview = "\n     ".join(lines[-20:])
                  print(f"  -> opencode 输出 (最后 20 行):\n     {preview}")

              if git_commit_push_all(
                  f"opencode: 修复影响实验结果的问题 "
                  f"(第 {iteration} 次迭代)"
              ):
                  print("  -> 已提交并推送")
              else:
                  print("  -> 提交/推送失败；将继续处理。")

          print("完成。")
          PYEOF

  # ==========================================
  # 自触发 Job
  # ==========================================
  trigger-next:
    needs: llm-fix
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    timeout-minutes: 5
    steps:
      - name: Trigger next workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_REF: ${{ github.ref }}
          REPO: ${{ github.repository }}
        run: |
          echo "上一个任务的状态: ${{ needs.llm-fix.result }}"
          echo "等待 10 秒进行清理..."
          sleep 10

          WF_ID=$(gh api "/repos/$REPO/actions/workflows" --jq ".workflows[] | select(.name == \"$WORKFLOW_NAME\") | .id")

          if [ -z "$WF_ID" ]; then
            echo "❌ 找不到 '$WORKFLOW_NAME' 的工作流 ID。循环将在此停止。"
            exit 1
          fi

          echo "找到工作流 ID: $WF_ID"

          if gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/workflows/$WF_ID/dispatch" \
            -f "ref=$WORKFLOW_REF"; then
            echo "✅ 成功触发 '$WORKFLOW_NAME' 在分支 '$WORKFLOW_REF' 上的下一次运行"
          else
            echo "❌ 触发下一次运行失败。"
            exit 1
          fi

          sleep 5
          echo "最近的工作流运行记录:"
          gh run list --workflow "$WORKFLOW_NAME" --limit 3